name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build APK + publish GitHub release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-native
    steps:
      - uses: actions/checkout@v4

      # Fail fast if the pushed tag and the single-source VERSION file disagree.
      # Tag "v1.0.29" must equal "v$(cat VERSION)".
      - name: Verify tag matches VERSION
        working-directory: ${{ github.workspace }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="v$(cat VERSION)"
          echo "tag=$TAG expected=$EXPECTED"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag '$TAG' does not match VERSION file ('$EXPECTED'). Bump VERSION and retag."
            exit 1
          fi

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ubuntu-latest ships a preinstalled Android SDK; the flaky
      # android-actions/setup-android action (emulator download) is avoided.

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      # Optional release-signing material. When the ULTRA_* secrets are absent
      # the build falls back to the debug keystore (see build.gradle.kts), still
      # producing an installable debug-signed APK. When present, we materialise
      # the base64 keystore + lineage to disk and the resignRelease task re-signs
      # the APK with the rotation lineage via apksigner.
      - name: Materialise signing keystore (if configured)
        id: signing
        env:
          ULTRA_KEYSTORE_BASE64: ${{ secrets.ULTRA_KEYSTORE_BASE64 }}
          ULTRA_LINEAGE_BASE64: ${{ secrets.ULTRA_LINEAGE_BASE64 }}
        run: |
          if [ -n "$ULTRA_KEYSTORE_BASE64" ]; then
            echo "$ULTRA_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/ultra.keystore"
            echo "keystore=$RUNNER_TEMP/ultra.keystore" >> "$GITHUB_OUTPUT"
            echo "signed=true" >> "$GITHUB_OUTPUT"
            if [ -n "$ULTRA_LINEAGE_BASE64" ]; then
              echo "$ULTRA_LINEAGE_BASE64" | base64 -d > "$RUNNER_TEMP/ultra.lineage"
              echo "lineage=$RUNNER_TEMP/ultra.lineage" >> "$GITHUB_OUTPUT"
            fi
            echo "Release signing material configured."
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "No ULTRA_* secrets — falling back to plain debug-signed APK."
          fi

      - name: Build release APK
        env:
          ULTRA_KEYSTORE: ${{ steps.signing.outputs.keystore }}
          ULTRA_KEYSTORE_PASSWORD: ${{ secrets.ULTRA_KEYSTORE_PASSWORD }}
          ULTRA_KEY_ALIAS: ${{ secrets.ULTRA_KEY_ALIAS }}
          ULTRA_KEY_PASSWORD: ${{ secrets.ULTRA_KEY_PASSWORD }}
          ULTRA_LINEAGE: ${{ steps.signing.outputs.lineage }}
        run: |
          chmod +x gradlew
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            ./gradlew assembleRelease resignRelease --console=plain --stacktrace
          else
            ./gradlew assembleRelease --console=plain --stacktrace
          fi

      # AGP emits app-release.apk; the release artifact / in-app updater both
      # expect AlphaHostingTV-debug.apk (debug-suffixed applicationId lineage).
      # Rename and emit the sibling .sha256 the updater verifies.
      - name: Stage release assets
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p dist
          SRC="android-native/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$SRC" ]; then
            echo "::error::Expected APK not found at $SRC"
            ls -R android-native/app/build/outputs/apk || true
            exit 1
          fi
          cp "$SRC" dist/AlphaHostingTV-debug.apk
          cd dist
          sha256sum AlphaHostingTV-debug.apk | awk '{print $1}' > AlphaHostingTV-debug.apk.sha256
          echo "SHA-256:"; cat AlphaHostingTV-debug.apk.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/AlphaHostingTV-debug.apk
            dist/AlphaHostingTV-debug.apk.sha256
